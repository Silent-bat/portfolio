<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f0f0f"/>
  
  <!-- Gold accent line top-left -->
  <rect x="10" y="10" width="20" height="2.5" rx="1.25" fill="#d4a855"/>
  
  <!-- R letter -->
  <!-- Vertical stem -->
  <rect x="10" y="10" width="3.5" height="28" rx="1.5" fill="#f0f0f0"/>
  <!-- Top horizontal bar -->
  <rect x="10" y="10" width="14" height="3.5" rx="1.5" fill="#f0f0f0"/>
  <!-- Middle horizontal bar -->
  <rect x="10" y="22.5" width="12" height="3.5" rx="1.5" fill="#f0f0f0"/>
  <!-- Curved bowl right side top -->
  <rect x="20.5" y="10" width="3.5" height="13" rx="1.75" fill="#f0f0f0"/>
  <!-- Diagonal leg -->
  <line x1="22" y1="26" x2="32" y2="38" stroke="#f0f0f0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- K letter -->
  <!-- Vertical stem -->
  <rect x="36" y="10" width="3.5" height="28" rx="1.5" fill="#f0f0f0"/>
  <!-- Upper diagonal (top-right) -->
  <line x1="39.5" y1="24" x2="54" y2="10.5" stroke="#f0f0f0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lower diagonal (bottom-right) -->
  <line x1="39.5" y1="24" x2="54" y2="38" stroke="#f0f0f0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Gold accent dot bottom-right -->
  <circle cx="52" cy="50" r="4" fill="#d4a855"/>
  <!-- Gold accent line bottom -->
  <rect x="10" y="50" width="36" height="2.5" rx="1.25" fill="#d4a855" opacity="0.5"/>
</svg>
